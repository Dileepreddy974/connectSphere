services:
  # MongoDB Database
  mongodb:
    image: mongo:6.0
    container_name: connectsphere-mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-password}
      MONGO_INITDB_DATABASE: connectsphere
    volumes:
      - mongodb_data:/data/db
    networks:
      - connectsphere
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend Service
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: connectsphere-backend
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: development
      PORT: 5000
      MONGODB_URI: mongodb://${MONGO_USER:-admin}:${MONGO_PASSWORD:-password}@mongodb:27017/connectsphere
      JWT_SECRET: ${JWT_SECRET:-your_super_secret_jwt_key}
      JWT_EXPIRE: 7d
      FRONTEND_URL: http://localhost:3000
      RATE_LIMIT_WINDOW_MS: 900000
      RATE_LIMIT_MAX_REQUESTS: 100
      AUTH_RATE_LIMIT_MAX_REQUESTS: 20
      TRUST_PROXY_HOPS: 0
      HTTP_BODY_LIMIT: 2mb
      SOCKET_MAX_BUFFER_SIZE: 1048576
      SOCKET_RATE_LIMIT_WINDOW_MS: 10000
      SOCKET_RATE_LIMIT_MAX_EVENTS: 100
      SHUTDOWN_TIMEOUT_MS: 10000
      MONGO_MAX_POOL_SIZE: 20
      MONGO_MIN_POOL_SIZE: 2
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - connectsphere
    restart: unless-stopped
    volumes:
      - ./backend/src:/app/src
    command: npm run dev

  # Frontend Service
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: connectsphere-frontend
    ports:
      - "3000:3000"
    environment:
      REACT_APP_API_URL: http://localhost:5000/api
      REACT_APP_SOCKET_URL: http://localhost:5000
      REACT_APP_NODE_ENV: development
    depends_on:
      - backend
    networks:
      - connectsphere
    restart: unless-stopped

volumes:
  mongodb_data:

networks:
  connectsphere:
    driver: bridge
